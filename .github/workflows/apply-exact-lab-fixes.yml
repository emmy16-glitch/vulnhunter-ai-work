name: Apply exact controlled lab fixes

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'pull_request' && github.head_ref == 'milestone32/unified-verification-worker-pilot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: milestone32/unified-verification-worker-pilot
      - run: python scripts/fix_controlled_lab_line_lengths.py
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python -m pip install ruff
          python -m ruff format vulnhunter/adversary_lab/runner.py vulnhunter/adversary_lab/service.py vulnhunter/web/lab_views.py
          python -m ruff check vulnhunter/adversary_lab/runner.py vulnhunter/adversary_lab/service.py vulnhunter/web/lab_views.py
      - name: Commit exact fixes
        shell: bash
        run: |
          set -eu
          git config user.name "VulnHunter CI"
          git config user.email "actions@users.noreply.github.com"
          git add vulnhunter/adversary_lab/runner.py vulnhunter/adversary_lab/service.py vulnhunter/web/lab_views.py
          git commit -m "Fix controlled validation lint issues"
          git push origin HEAD:milestone32/unified-verification-worker-pilot
