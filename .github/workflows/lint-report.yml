name: Temporary lint report

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install ruff
      - name: Capture Ruff output
        shell: bash
        run: python -m ruff check . > "$RUNNER_TEMP/ruff.txt" 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: ruff-output
          path: ${{ runner.temp }}/ruff.txt
          retention-days: 1
