            vulnhunter/web/stream_views.py \
            vulnhunter/web/static/web/activity.js \
            vulnhunter/web/templates/web/agent_run_detail.html \
            tests/unit/test_phone_lab_live_activity.py
          git add -u
          git commit -m "Finalize live phone-lab assessment wiring"
          git push origin HEAD:refs/heads/work/phone-only-private-lab
