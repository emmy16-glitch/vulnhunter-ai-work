name: VulnHunter quality gates

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-operational-validation-ui:
    if: github.event_name == 'pull_request' && github.head_ref == 'milestone32/unified-verification-worker-pilot'
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: milestone32/unified-verification-worker-pilot
      - name: Apply governed permissions and UI wiring
        run: |
          python scripts/patch_validation_permissions.py
          python scripts/patch_assessment_validation_ui.py
          python scripts/patch_operational_activity_ui.py
          python scripts/patch_operational_assets.py
      - name: Format and commit wiring
        shell: bash
        run: |
          set -eu
          python -m pip install ruff
          python -m ruff format vulnhunter/web/views.py vulnhunter/web/lab_views.py
          python -m ruff check vulnhunter/web/views.py vulnhunter/web/lab_views.py --fix
          git config user.name "VulnHunter CI"
          git config user.email "actions@users.noreply.github.com"
          git add vulnhunter/web/views.py vulnhunter/web/lab_views.py vulnhunter/web/templates/web/agent_run_detail.html vulnhunter/web/templates/web/base.html vulnhunter/web/static/web/app.js
          git commit -m "Wire live validation workspace into assessments"
          git push origin HEAD:milestone32/unified-verification-worker-pilot

  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and verification tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio pytest-django ruff

      - name: Lint
        run: python -m ruff check .

      - name: Compile
        run: python -m compileall -q vulnhunter scripts

      - name: Validate scanner compatibility
        run: python scripts/validate_scanner_compatibility.py

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q --maxfail=5 2>&1 | tee "$RUNNER_TEMP/pytest-${{ matrix.python-version }}.log"

      - name: Upload failed test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-${{ matrix.python-version }}
          path: ${{ runner.temp }}/pytest-${{ matrix.python-version }}.log
          if-no-files-found: error
          retention-days: 3

      - name: Verify formatting
        run: python -m ruff format --check .

      - name: Repository audit
        run: python scripts/project_audit.py --strict
