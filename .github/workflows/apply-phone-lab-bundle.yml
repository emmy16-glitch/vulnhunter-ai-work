name: Apply phone-lab implementation

on:
  push:
    branches: [work/phone-only-private-lab]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out staging commit
        uses: actions/checkout@v7
        with:
          ref: work/phone-only-private-lab
          fetch-depth: 0

      - name: Verify and import reviewed implementation
        shell: bash
        run: |
          set -euo pipefail
          cat .codex/phone-bundle/part* | base64 --decode > "$RUNNER_TEMP/phone-lab.bundle.gz"
          echo "a52ea50b3a777438a7f756f3a7be38d7fc788a79e498ff3e9f866dc6e01f3ec9  $RUNNER_TEMP/phone-lab.bundle.gz" | sha256sum --check
          gzip --decompress --stdout "$RUNNER_TEMP/phone-lab.bundle.gz" > "$RUNNER_TEMP/phone-lab.bundle"
          echo "fbdeb0f8587445c52dd151f8ea1c07c5e4ff844a529605313a93f2ad1faba18d  $RUNNER_TEMP/phone-lab.bundle" | sha256sum --check
          git bundle verify "$RUNNER_TEMP/phone-lab.bundle"
          git fetch "$RUNNER_TEMP/phone-lab.bundle" a655dfa8dd5a432d78dffd982e209d9ee7fb1a41
          test "$(git rev-parse FETCH_HEAD)" = "a655dfa8dd5a432d78dffd982e209d9ee7fb1a41"
          test "$(git rev-parse FETCH_HEAD^{tree})" = "cea43d3f0a72a993cd2a00921efbc92b077d4b0c"

      - name: Publish reviewed implementation tree
        shell: bash
        run: |
          set -euo pipefail
          git push \
            --force-with-lease=refs/heads/work/phone-only-private-lab:${GITHUB_SHA} \
            origin \
            FETCH_HEAD:refs/heads/work/phone-only-private-lab
