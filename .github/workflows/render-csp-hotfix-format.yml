name: Render CSP chat hotfix formatting

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install ruff
      - run: python -m ruff format tests/unit/test_chat_runtime_reply.py
      - uses: actions/upload-artifact@v6
        with:
          name: formatted-csp-chat-runtime-test
          path: tests/unit/test_chat_runtime_reply.py
          retention-days: 1
