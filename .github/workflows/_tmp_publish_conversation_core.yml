name: Publish conversational core redesign

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    if: github.head_ref == 'feature/conversational-url-targets'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Detect completed redesign
        id: guard
        run: |
          if [[ -f vulnhunter/web/conversation_state.py ]]; then
            echo "done=true" >> "$GITHUB_OUTPUT"
          else
            echo "done=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v6
        if: steps.guard.outputs.done == 'false'
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v6
        if: steps.guard.outputs.done == 'false'
        with:
          node-version: '22'
      - name: Generate redesign
        if: steps.guard.outputs.done == 'false'
        run: python scripts/_tmp_run_conversation_core.py
      - name: Preserve workflow updates for connector publication
        if: steps.guard.outputs.done == 'false'
        run: git checkout -- .github/workflows/conversation-quality.yml .github/workflows/quality.yml
      - name: Normalize generated copy
        if: steps.guard.outputs.done == 'false'
        run: |
          python - <<'PY'
          from pathlib import Path

          for filename in (
              'tests/ui/prepare_conversation_e2e.py',
              'tests/ui/complete_conversation_run.py',
          ):
              path = Path(filename)
              content = path.read_text(encoding='utf-8')
              marker = 'from __future__ import annotations\n'
              content = content.replace(
                  marker,
                  '# ruff: noqa: E402\n\n' + marker,
                  1,
              )
              path.write_text(content, encoding='utf-8')

          service = Path('vulnhunter/web/conversation_service.py')
          content = service.read_text(encoding='utf-8')
          content = content.replace(
              '        "assess a target, status only for progress questions, and chat for greetings, explanations, "\n'
              '        "help, links, or other ordinary conversation. "\n'
              '        "conversation. recommended_profile must be one supplied profile or null. missing must be "\n',
              '        "assess a target, status only for progress questions, and chat for greetings, "\n'
              '        "explanations, help, links, or other ordinary conversation. "\n'
              '        "recommended_profile must be one supplied profile or null. missing must be "\n',
              1,
          )
          service.write_text(content, encoding='utf-8')

          state = Path('vulnhunter/web/conversation_state.py')
          content = state.read_text(encoding='utf-8')
          replacements = {
              '            "Review the displayed target, port, passive templates and limits, then confirm the exact "\n'
              '            "plan. No scanner traffic starts before that confirmation."\n':
              '            "Review the displayed target, port, passive templates and limits, then "\n'
              '            "confirm the exact plan. No scanner traffic starts before confirmation."\n',
              '                "Open the evidence, verify the affected service, apply the recommended control, then "\n'
              '                "request a bounded remediation retest."\n':
              '                "Open the evidence, verify the affected service, apply the recommended "\n'
              '                "control, then request a bounded remediation retest."\n',
              '            "Review the tested coverage and technical details. Expand the profile or scope only when "\n'
              '            "the additional checks are explicitly authorised."\n':
              '            "Review the tested coverage and technical details. Expand the profile or "\n'
              '            "scope only when the additional checks are explicitly authorised."\n',
              '        f"The assessment is not finished yet. {status_reply(payload)} Findings are shown only after "\n'
              '        "they are persisted and verified."\n':
              '        f"The assessment is not finished yet. {status_reply(payload)} Findings are "\n'
              '        "shown only after they are persisted and verified."\n',
              '            return f"The current approval state is {_text(payload.get(\'approval_state\')) or \'not required\'}."\n':
              '            approval_state = (\n'
              '                _text(payload.get("approval_state")) or "not required"\n'
              '            )\n'
              '            return f"The current approval state is {approval_state}."\n',
              '            f"{_text(payload.get(\'current_step\'))} You can ask for status, results, evidence or the "\n'
              '            "next step."\n':
              '            f"{_text(payload.get(\'current_step\'))} You can ask for status, results, "\n'
              '            "evidence or the next step."\n',
          }
          for old, new in replacements.items():
              content = content.replace(old, new, 1)
          state.write_text(content, encoding='utf-8')

          views = Path('vulnhunter/web/conversational_views.py')
          content = views.read_text(encoding='utf-8')
          content = content.replace(
              '                content="That assessment is already finished, so there is no running work to cancel.",\n',
              '                content=(\n'
              '                    "That assessment is already finished, so there is no running "\n'
              '                    "work to cancel."\n'
              '                ),\n',
              1,
          )
          content = content.replace(
              '            content="Which authorised assessment profile should I use? Passive is recommended first.",\n',
              '            content=(\n'
              '                "Which authorised assessment profile should I use? Passive is "\n'
              '                "recommended first."\n'
              '            ),\n',
              1,
          )
          views.write_text(content, encoding='utf-8')
          PY
      - name: Install tools and format
        if: steps.guard.outputs.done == 'false'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-asyncio pytest-django ruff
          python -m ruff check --fix \
            vulnhunter/web/conversation_service.py \
            vulnhunter/web/conversation_state.py \
            vulnhunter/web/conversational_views.py \
            vulnhunter/web/conversation_approval_views.py \
            tests/unit/test_conversation_core_redesign.py \
            tests/unit/test_conversation_experience.py \
            tests/ui/prepare_conversation_e2e.py \
            tests/ui/complete_conversation_run.py || true
          python -m ruff format \
            vulnhunter/web/conversation_service.py \
            vulnhunter/web/conversation_state.py \
            vulnhunter/web/conversational_views.py \
            vulnhunter/web/conversation_approval_views.py \
            tests/unit/test_conversation_core_redesign.py \
            tests/unit/test_conversation_experience.py \
            tests/ui/prepare_conversation_e2e.py \
            tests/ui/complete_conversation_run.py
      - name: Validate redesign
        id: validation
        continue-on-error: true
        if: steps.guard.outputs.done == 'false'
        env:
          VULNHUNTER_WEB_DEBUG: 'true'
          VULNHUNTER_GROQ_ENABLED: 'false'
        run: |
          set -o pipefail
          {
            node --check vulnhunter/web/static/web/conversation.js
            node --check tests/ui/conversation_e2e.cjs
            python -m ruff check \
              vulnhunter/web/conversation_service.py \
              vulnhunter/web/conversation_state.py \
              vulnhunter/web/conversational_views.py \
              vulnhunter/web/conversation_approval_views.py \
              tests/unit/test_conversation_core_redesign.py \
              tests/unit/test_conversation_experience.py \
              tests/ui/prepare_conversation_e2e.py \
              tests/ui/complete_conversation_run.py
            python -m pytest -q \
              tests/unit/test_conversation_core_redesign.py \
              tests/unit/test_conversational_url_targets.py \
              tests/unit/test_conversation_experience.py \
              tests/unit/test_conversational_workspace.py \
              tests/unit/test_inline_confirmation_endpoint.py \
              tests/unit/test_assessment_workflow.py
          } 2>&1 | tee conversation-core-validation.log
      - name: Upload generated redesign diagnostics
        if: steps.guard.outputs.done == 'false'
        uses: actions/upload-artifact@v6
        with:
          name: conversation-core-validation
          retention-days: 2
          path: |
            conversation-core-validation.log
            vulnhunter/web/conversation_service.py
            vulnhunter/web/conversation_state.py
            vulnhunter/web/conversational_views.py
            vulnhunter/web/conversation_approval_views.py
            vulnhunter/web/static/web/conversation.js
            vulnhunter/web/static/web/conversation-layout.css
            vulnhunter/web/templates/web/conversation.html
            tests/unit/test_conversation_core_redesign.py
            tests/unit/test_conversation_experience.py
            tests/ui/prepare_conversation_e2e.py
            tests/ui/complete_conversation_run.py
            tests/ui/conversation_e2e.cjs
      - name: Commit redesign
        if: steps.guard.outputs.done == 'false' && steps.validation.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            vulnhunter/web/conversation_service.py \
            vulnhunter/web/conversation_state.py \
            vulnhunter/web/conversational_views.py \
            vulnhunter/web/conversation_approval_views.py \
            vulnhunter/web/static/web/conversation.js \
            vulnhunter/web/static/web/conversation-layout.css \
            vulnhunter/web/templates/web/conversation.html \
            tests/unit/test_conversation_core_redesign.py \
            tests/unit/test_conversation_experience.py \
            tests/ui/prepare_conversation_e2e.py \
            tests/ui/complete_conversation_run.py \
            tests/ui/conversation_e2e.cjs
          git commit -m "Redesign conversational assessment workflow"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Fail when validation failed
        if: steps.guard.outputs.done == 'false' && steps.validation.outcome != 'success'
        run: exit 1
