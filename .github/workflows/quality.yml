              '''        outcomes = ()
          if record.state is ScannerJobState.COMPLETED:
              pipeline = EvidenceVerificationPipeline(
''',
              '''        outcomes = ()
          if record.state is ScannerJobState.COMPLETED:
              self._activity(
                  job.job_id,
