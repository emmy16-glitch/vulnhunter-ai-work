name: VulnHunter quality gates

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Capture Milestone 32 implementation inventory
        shell: bash
        run: |
          set -eu
          {
            echo "# files"
            find . -type f -not -path './.git/*' | sort
            echo
            echo "# qwen ollama openvas oracle groq references"
            grep -RInE 'Qwen|qwen|Ollama|ollama|OpenVAS|openvas|Greenbone|greenbone|Machine Oracle|machine-oracle|Groq|groq' \
              --exclude-dir=.git . || true
            echo
            echo "# scanner worker and provider references"
            grep -RInE 'scanner_worker|NucleiExecutionHarness|ScannerCandidateObservation|provider_runtime|candidate finding|proof capsule' \
              --exclude-dir=.git . || true
          } > "$RUNNER_TEMP/milestone32-inventory.txt"
      - name: Upload implementation inventory
        uses: actions/upload-artifact@v4
        with:
          name: milestone32-inventory
          path: ${{ runner.temp }}/milestone32-inventory.txt
          retention-days: 1

  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and verification tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio pytest-django ruff

      - name: Lint
        run: python -m ruff check .

      - name: Compile
        run: python -m compileall -q vulnhunter scripts

      - name: Validate scanner compatibility
        run: python scripts/validate_scanner_compatibility.py

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q --maxfail=5 2>&1 | tee "$RUNNER_TEMP/pytest-${{ matrix.python-version }}.log"

      - name: Upload failed test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-${{ matrix.python-version }}
          path: ${{ runner.temp }}/pytest-${{ matrix.python-version }}.log
          if-no-files-found: error
          retention-days: 3

      - name: Verify formatting
        run: python -m ruff format --check .

      - name: Repository audit
        run: python scripts/project_audit.py --strict
