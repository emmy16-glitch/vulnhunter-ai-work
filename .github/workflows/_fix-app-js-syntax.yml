name: Repair shared browser script syntax

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/full-ui-audit-and-wiring
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Remove the stray IIFE-closing brace
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("vulnhunter/web/static/web/app.js")
          text = path.read_text(encoding="utf-8")
          old = "\n}\n\n  const disclosureRoute"
          new = "\n\n  const disclosureRoute"
          if old not in text:
              raise SystemExit("the expected stray brace was not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          node --check vulnhunter/web/static/web/app.js
          node --check .playwright-validate.cjs
          git diff --check
      - name: Commit repaired script
        run: |
          git config user.name 'OpenAI Agent'
          git config user.email 'agent@openai.com'
          git add vulnhunter/web/static/web/app.js
          git commit -m 'Repair shared browser script syntax'
          git push origin HEAD:agent/full-ui-audit-and-wiring
