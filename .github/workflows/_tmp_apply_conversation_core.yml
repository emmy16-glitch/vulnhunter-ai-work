name: Apply conversational core redesign

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/conversational-url-targets'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Detect completed redesign
        id: guard
        run: |
          if [[ -f vulnhunter/web/conversation_state.py ]]; then
            echo "done=true" >> "$GITHUB_OUTPUT"
          else
            echo "done=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v6
        if: steps.guard.outputs.done == 'false'
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v6
        if: steps.guard.outputs.done == 'false'
        with:
          node-version: '22'
      - name: Normalize patcher
        if: steps.guard.outputs.done == 'false'
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/_tmp_apply_conversation_core.py')
          content = path.read_text(encoding='utf-8')
          helper_anchor = '''def regex_once(path: str, pattern: str, replacement: str) -> None:\n'''
          helper = '''def replace_all(path: str, old: str, new: str, *, expected: int) -> None:\n    content = read(path)\n    count = content.count(old)\n    if count != expected:\n        raise RuntimeError(\n            f"Expected {expected} matches in {path}, found {count}: {old[:120]!r}"\n        )\n    write(path, content.replace(old, new))\n\n\n'''
          if 'def replace_all(' not in content:
              content = content.replace(helper_anchor, helper + helper_anchor, 1)

          module_old = '''replace_once(\n    ".github/workflows/conversation-quality.yml",\n    \'\'\'            vulnhunter/web/conversation_service.py \\\\\\n            vulnhunter/web/conversational_authorization.py \\\\\\n            vulnhunter/web/conversational_views.py \\\\\\n\'\'\',\n    \'\'\'            vulnhunter/web/conversation_service.py \\\\\\n            vulnhunter/web/conversation_state.py \\\\\\n            vulnhunter/web/conversational_authorization.py \\\\\\n            vulnhunter/web/conversational_views.py \\\\\\n\'\'\',\n)'''
          module_new = module_old.replace('replace_once(', 'replace_all(', 1).replace('\n)', '\n    expected=2,\n)', 1)
          content = content.replace(module_old, module_new, 1)

          tests_old = '''replace_once(\n    ".github/workflows/conversation-quality.yml",\n    \'\'\'            tests/unit/test_chat_runtime_reply.py \\\\\\n            tests/unit/test_conversational_url_targets.py \\\\\\n\'\'\',\n    \'\'\'            tests/unit/test_chat_runtime_reply.py \\\\\\n            tests/unit/test_conversation_core_redesign.py \\\\\\n            tests/unit/test_conversational_url_targets.py \\\\\\n\'\'\',\n)'''
          tests_new = tests_old.replace('replace_once(', 'replace_all(', 1).replace('\n)', '\n    expected=3,\n)', 1)
          content = content.replace(tests_old, tests_new, 1)

          redundant = '''replace_once(\n    ".github/workflows/conversation-quality.yml",\n    \'\'\'            tests/unit/test_chat_runtime_reply.py \\\\\\n            tests/unit/test_conversational_url_targets.py \\\\\\n            tests/unit/test_conversation_experience.py \\\\\\n\'\'\',\n    \'\'\'            tests/unit/test_chat_runtime_reply.py \\\\\\n            tests/unit/test_conversation_core_redesign.py \\\\\\n            tests/unit/test_conversational_url_targets.py \\\\\\n            tests/unit/test_conversation_experience.py \\\\\\n\'\'\',\n)\n'''
          content = content.replace(redundant, '', 1)

          env_old = '''replace_once(\n    ".github/workflows/quality.yml",\n    '      VULNHUNTER_INTELLIGENCE_ENABLED: "false"\\n',\n    \'\'\'      VULNHUNTER_INTELLIGENCE_ENABLED: "false"\\n      VULNHUNTER_NUCLEI_READINESS_REPORT: /tmp/vh-ui/nuclei-readiness.json\\n      VULNHUNTER_NUCLEI_PILOT_ENQUEUE_ENABLED: "true"\\n      VULNHUNTER_NUCLEI_WORKER_SIGNING_KEY_FILE: /tmp/vh-ui/worker-signing.key\\n      VULNHUNTER_NUCLEI_WORKER_SPOOL_ROOT: /tmp/vh-ui/worker-spool\\n\'\'\',\n)'''
          env_new = '''replace_once(\n    ".github/workflows/quality.yml",\n    \'\'\'      VULNHUNTER_UI_BASE_URL: http://127.0.0.1:8767\\n      VULNHUNTER_INTELLIGENCE_ENABLED: "false"\\n\'\'\',\n    \'\'\'      VULNHUNTER_UI_BASE_URL: http://127.0.0.1:8767\\n      VULNHUNTER_INTELLIGENCE_ENABLED: "false"\\n      VULNHUNTER_NUCLEI_READINESS_REPORT: /tmp/vh-ui/nuclei-readiness.json\\n      VULNHUNTER_NUCLEI_PILOT_ENQUEUE_ENABLED: "true"\\n      VULNHUNTER_NUCLEI_WORKER_SIGNING_KEY_FILE: /tmp/vh-ui/worker-signing.key\\n      VULNHUNTER_NUCLEI_WORKER_SPOOL_ROOT: /tmp/vh-ui/worker-spool\\n\'\'\',\n)'''
          content = content.replace(env_old, env_new, 1)
          path.write_text(content, encoding='utf-8')
          PY
      - name: Apply redesign
        if: steps.guard.outputs.done == 'false'
        run: python scripts/_tmp_apply_conversation_core.py
      - name: Keep workflow updates for connector publication
        if: steps.guard.outputs.done == 'false'
        run: git checkout -- .github/workflows/conversation-quality.yml .github/workflows/quality.yml
      - name: Install and format
        if: steps.guard.outputs.done == 'false'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-asyncio pytest-django ruff
          python -m ruff check --fix \
            vulnhunter/web/conversation_service.py \
            vulnhunter/web/conversation_state.py \
            vulnhunter/web/conversational_views.py \
            vulnhunter/web/conversation_approval_views.py \
            tests/unit/test_conversation_core_redesign.py \
            tests/unit/test_conversation_experience.py \
            tests/ui/prepare_conversation_e2e.py \
            tests/ui/complete_conversation_run.py
          python -m ruff format \
            vulnhunter/web/conversation_service.py \
            vulnhunter/web/conversation_state.py \
            vulnhunter/web/conversational_views.py \
            vulnhunter/web/conversation_approval_views.py \
            tests/unit/test_conversation_core_redesign.py \
            tests/unit/test_conversation_experience.py \
            tests/ui/prepare_conversation_e2e.py \
            tests/ui/complete_conversation_run.py
      - name: Validate core redesign
        if: steps.guard.outputs.done == 'false'
        env:
          VULNHUNTER_WEB_DEBUG: 'true'
          VULNHUNTER_GROQ_ENABLED: 'false'
        run: |
          node --check vulnhunter/web/static/web/conversation.js
          node --check tests/ui/conversation_e2e.cjs
          python -m ruff check \
            vulnhunter/web/conversation_service.py \
            vulnhunter/web/conversation_state.py \
            vulnhunter/web/conversational_views.py \
            vulnhunter/web/conversation_approval_views.py \
            tests/unit/test_conversation_core_redesign.py \
            tests/unit/test_conversation_experience.py \
            tests/ui/prepare_conversation_e2e.py \
            tests/ui/complete_conversation_run.py
          python -m pytest -q \
            tests/unit/test_conversation_core_redesign.py \
            tests/unit/test_conversational_url_targets.py \
            tests/unit/test_conversation_experience.py \
            tests/unit/test_conversational_workspace.py \
            tests/unit/test_inline_confirmation_endpoint.py \
            tests/unit/test_assessment_workflow.py
      - name: Commit redesign
        if: steps.guard.outputs.done == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            vulnhunter/web/conversation_service.py \
            vulnhunter/web/conversation_state.py \
            vulnhunter/web/conversational_views.py \
            vulnhunter/web/conversation_approval_views.py \
            vulnhunter/web/static/web/conversation.js \
            vulnhunter/web/static/web/conversation-layout.css \
            vulnhunter/web/templates/web/conversation.html \
            tests/unit/test_conversation_core_redesign.py \
            tests/unit/test_conversation_experience.py \
            tests/ui/prepare_conversation_e2e.py \
            tests/ui/complete_conversation_run.py \
            tests/ui/conversation_e2e.cjs
          git commit -m "Redesign conversational assessment workflow"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
