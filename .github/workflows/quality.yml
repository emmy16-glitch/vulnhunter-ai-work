name: VulnHunter quality gates

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and verification tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio ruff

      - name: Lint
        run: python -m ruff check .

      - name: Compile
        run: python -m compileall -q vulnhunter scripts

      - name: Test
        run: python -m pytest -q

      - name: Verify formatting
        run: python -m ruff format --check .

      - name: Repository audit
        run: python scripts/project_audit.py --strict
