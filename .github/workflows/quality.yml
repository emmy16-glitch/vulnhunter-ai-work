name: VulnHunter quality gates

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repair branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Update stale UI contract assertions
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/unit/test_reference_ui_contract.py")
          text = path.read_text(encoding="utf-8")

          old_tabs = '''    assert listing.count('role="tab"') >= 8
              assert detail.count('role="tab"') >= 8
              assert "querySelector(\":scope > [role='tablist']\")" in script'''.replace(
              "              ", "    "
          )
          new_tabs = '''    assert 'data-assessment-collection' in listing
              assert 'data-launch-dialog' in listing
              assert 'data-authorization-select' in listing
              assert detail.count('role="tab"') >= 8
              assert "querySelector(\":scope > [role='tablist']\")" in script'''.replace(
              "              ", "    "
          )

          old_launch = '''    assert "Web launch not enabled" in _text(
              ROOT / "vulnhunter" / "web" / "templates" / "web" / "new_scan.html"
          )'''
          new_launch = '''    new_scan = _text(
              ROOT / "vulnhunter" / "web" / "templates" / "web" / "new_scan.html"
          )
          assert "Create launch request" in new_scan
          assert "This form does not start a scanner or enable network execution." in new_scan
          assert 'data-assessment-form' in new_scan'''

          for old, new in ((old_tabs, new_tabs), (old_launch, new_launch)):
              if old not in text:
                  raise SystemExit(f"Expected stale assertion block not found:\n{old}")
              text = text.replace(old, new, 1)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Verify updated contract test syntax and lint
        run: |
          python -m pip install ruff
          python -m compileall -q tests/unit/test_reference_ui_contract.py
          python -m ruff check tests/unit/test_reference_ui_contract.py

      - name: Commit updated contract tests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/unit/test_reference_ui_contract.py
          if git diff --cached --quiet; then
            echo "No test repair changes required."
          else
            git commit -m "Update assessment UI contract tests"
            git push origin "HEAD:${{ github.head_ref }}"
          fi

  verify:
    needs: repair-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and verification tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio pytest-django ruff

      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          python -m ruff check . 2>&1 | tee "$RUNNER_TEMP/ruff-${{ matrix.python-version }}.log"

      - name: Upload lint log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-log-${{ matrix.python-version }}
          path: ${{ runner.temp }}/ruff-${{ matrix.python-version }}.log
          if-no-files-found: warn
          retention-days: 3

      - name: Compile
        run: python -m compileall -q vulnhunter scripts

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q --maxfail=5 2>&1 | tee "$RUNNER_TEMP/pytest-${{ matrix.python-version }}.log"

      - name: Upload failed test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-${{ matrix.python-version }}
          path: ${{ runner.temp }}/pytest-${{ matrix.python-version }}.log
          if-no-files-found: warn
          retention-days: 3

      - name: Verify formatting
        run: python -m ruff format --check .

      - name: Repository audit
        run: python scripts/project_audit.py --strict
