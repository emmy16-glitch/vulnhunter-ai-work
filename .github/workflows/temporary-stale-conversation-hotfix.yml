name: Temporary stale conversation hotfix

on:
  push:
    branches:
      - hotfix/detach-completed-conversation

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: hotfix/detach-completed-conversation
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install project and test tools
        run: python -m pip install -e '.[dev]'
      - name: Apply exact repair
        run: python tools/apply_stale_conversation_hotfix.py
      - name: Format and test repair
        run: |
          node --check vulnhunter/web/static/web/conversation.js
          python -m ruff format \
            vulnhunter/web/conversation_state.py \
            vulnhunter/web/conversation_service.py \
            vulnhunter/web/conversational_views.py \
            tests/unit/test_stale_conversation_state.py
          python -m ruff check \
            vulnhunter/web/conversation_state.py \
            vulnhunter/web/conversation_service.py \
            vulnhunter/web/conversational_views.py \
            tests/unit/test_stale_conversation_state.py
          python -m pytest -q \
            tests/unit/test_stale_conversation_state.py \
            tests/unit/test_conversation_core_redesign.py \
            tests/unit/test_conversation_experience.py
      - name: Commit repaired files
        run: |
          if git diff --quiet -- \
            vulnhunter/web/conversation_state.py \
            vulnhunter/web/conversation_service.py \
            vulnhunter/web/conversational_views.py \
            vulnhunter/web/static/web/conversation.js \
            tests/unit/test_stale_conversation_state.py; then
            echo 'Repair already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            vulnhunter/web/conversation_state.py \
            vulnhunter/web/conversation_service.py \
            vulnhunter/web/conversational_views.py \
            vulnhunter/web/static/web/conversation.js \
            tests/unit/test_stale_conversation_state.py
          git commit -m 'Detach completed runs from ordinary conversation'
          git push origin HEAD:hotfix/detach-completed-conversation
