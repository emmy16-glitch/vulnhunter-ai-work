name: Apply conversational URL target intake

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  apply:
    if: github.head_ref == 'feature/conversational-url-targets'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Apply changes
        run: python scripts/_tmp_apply_url_target_intake.py
      - name: Install and format
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-asyncio pytest-django ruff
          python -m ruff format \
            vulnhunter/scope/validator.py \
            vulnhunter/web/conversation_service.py \
            vulnhunter/web/conversational_authorization.py \
            vulnhunter/web/conversational_views.py \
            tests/unit/test_conversational_url_targets.py
      - name: Validate generated changes
        id: validate
        continue-on-error: true
        env:
          VULNHUNTER_WEB_DEBUG: 'true'
          VULNHUNTER_GROQ_ENABLED: 'false'
        run: |
          set -o pipefail
          {
            python -m ruff check \
              vulnhunter/scope/validator.py \
              vulnhunter/web/conversation_service.py \
              vulnhunter/web/conversational_authorization.py \
              vulnhunter/web/conversational_views.py \
              tests/unit/test_conversational_url_targets.py
            python -m pytest -q \
              tests/unit/test_conversational_url_targets.py \
              tests/unit/test_conversational_workspace.py \
              tests/unit/test_assessment_workflow.py \
              tests/unit/test_nuclei_activation_controls.py
          } 2>&1 | tee generated-validation.log
      - name: Upload generated files
        uses: actions/upload-artifact@v6
        with:
          name: conversational-url-target-intake
          retention-days: 2
          path: |
            vulnhunter/scope/validator.py
            vulnhunter/web/conversation_service.py
            vulnhunter/web/conversational_authorization.py
            vulnhunter/web/conversational_views.py
            vulnhunter/web/templates/web/conversation.html
            tests/unit/test_conversational_url_targets.py
            .github/workflows/conversation-quality.yml
            generated-validation.log
      - name: Fail when validation failed
        if: steps.validate.outcome != 'success'
        run: exit 1
