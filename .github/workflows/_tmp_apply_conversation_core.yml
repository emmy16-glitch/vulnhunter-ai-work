name: Diagnose conversational core redesign

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'feature/conversational-url-targets'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Run patch and capture exact failure
        id: patch
        continue-on-error: true
        run: |
          set -o pipefail
          python scripts/_tmp_apply_conversation_core.py 2>&1 | tee conversation-core-patch.log
      - name: Upload patch diagnostics
        uses: actions/upload-artifact@v6
        with:
          name: conversation-core-patch-diagnostics
          retention-days: 2
          path: conversation-core-patch.log
      - name: Fail when patch failed
        if: steps.patch.outcome != 'success'
        run: exit 1
