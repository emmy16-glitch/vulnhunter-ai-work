name: VulnHunter quality gates

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repair branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Apply exact Ruff repairs
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              "vulnhunter/web/assessment_profiles.py": [
                  (
                      "from vulnhunter.advanced import AssessmentProfile\n\n\n_ASSESSMENT_PROFILES",
                      "from vulnhunter.advanced import AssessmentProfile\n\n_ASSESSMENT_PROFILES",
                  ),
              ],
              "vulnhunter/web/assessment_projection.py": [
                  (
                      '        "facts": tuple({"label": label, "value": _text(value, "Waiting")} for label, value in facts),',
                      '        "facts": tuple(\n'
                      '            {"label": label, "value": _text(value, "Waiting")}\n'
                      '            for label, value in facts\n'
                      '        ),',
                  ),
                  (
                      '            "The launch request is bound to a stored authorization record; runtime checks remain authoritative.",',
                      '            (\n'
                      '                "The launch request is bound to a stored authorization record; "\n'
                      '                "runtime checks remain authoritative."\n'
                      '            ),',
                  ),
                  (
                      '            _text(getattr(run, "policy_reason", None), "Policy evaluation has not produced a decision."),',
                      '            _text(\n'
                      '                getattr(run, "policy_reason", None),\n'
                      '                "Policy evaluation has not produced a decision.",\n'
                      '            ),',
                  ),
                  (
                      '            "Normalize tool output into hash-linked candidate evidence without copying unsafe raw exchanges.",',
                      '            (\n'
                      '                "Normalize tool output into hash-linked candidate evidence without "\n'
                      '                "copying unsafe raw exchanges."\n'
                      '            ),',
                  ),
                  (
                      '            "complete" if artifacts and tool_succeeded else "active" if tool_succeeded else "pending",',
                      '            (\n'
                      '                "complete"\n'
                      '                if artifacts and tool_succeeded\n'
                      '                else "active"\n'
                      '                if tool_succeeded\n'
                      '                else "pending"\n'
                      '            ),',
                  ),
                  (
                      '            "Independent verification remains evidence-bound and cannot be inferred from a scanner match.",',
                      '            (\n'
                      '                "Independent verification remains evidence-bound and cannot be inferred "\n'
                      '                "from a scanner match."\n'
                      '            ),',
                  ),
              ],
              "vulnhunter/web/assessment_views.py": [
                  (
                      '                            "Assessment launch request created. No scanner or network operation started.",',
                      '                            (\n'
                      '                                "Assessment launch request created. No scanner or network "\n'
                      '                                "operation started."\n'
                      '                            ),',
                  ),
              ],
          }

          for filename, file_replacements in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              for old, new in file_replacements:
                  if old not in text:
                      raise SystemExit(f"Expected repair target not found in {filename}: {old}")
                  text = text.replace(old, new, 1)
              path.write_text(text, encoding="utf-8")
          PY

      - name: Verify repaired lint targets
        run: |
          python -m pip install ruff
          python -m ruff check \
            vulnhunter/web/assessment_profiles.py \
            vulnhunter/web/assessment_projection.py \
            vulnhunter/web/assessment_views.py

      - name: Commit exact lint repairs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            vulnhunter/web/assessment_profiles.py \
            vulnhunter/web/assessment_projection.py \
            vulnhunter/web/assessment_views.py
          if git diff --cached --quiet; then
            echo "No repair changes required."
          else
            git commit -m "Fix Ruff lint violations"
            git push origin "HEAD:${{ github.head_ref }}"
          fi

  verify:
    needs: repair-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and verification tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio pytest-django ruff

      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          python -m ruff check . 2>&1 | tee "$RUNNER_TEMP/ruff-${{ matrix.python-version }}.log"

      - name: Upload lint log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-log-${{ matrix.python-version }}
          path: ${{ runner.temp }}/ruff-${{ matrix.python-version }}.log
          if-no-files-found: warn
          retention-days: 3

      - name: Compile
        run: python -m compileall -q vulnhunter scripts

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q --maxfail=5 2>&1 | tee "$RUNNER_TEMP/pytest-${{ matrix.python-version }}.log"

      - name: Upload failed test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-${{ matrix.python-version }}
          path: ${{ runner.temp }}/pytest-${{ matrix.python-version }}.log
          if-no-files-found: warn
          retention-days: 3

      - name: Verify formatting
        run: python -m ruff format --check .

      - name: Repository audit
        run: python scripts/project_audit.py --strict
