name: Temporary branch formatter

on:
  push:
    branches:
      - milestone-33-remote-nuclei-and-product-hardening

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: milestone-33-remote-nuclei-and-product-hardening
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install "ruff>=0.9,<1"
      - run: python -m ruff format .
      - name: Commit formatting only
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Apply Ruff formatting to Milestone 33"
          git push origin HEAD:milestone-33-remote-nuclei-and-product-hardening
