name: Apply conversational URL target intake

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feature/conversational-url-targets'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Stop when the patch is already applied
        id: guard
        run: |
          if [[ -f vulnhunter/web/conversational_authorization.py ]]; then
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v6
        if: steps.guard.outputs.applied == 'false'
        with:
          python-version: '3.12'
      - name: Apply changes
        if: steps.guard.outputs.applied == 'false'
        run: python scripts/_tmp_apply_url_target_intake.py
      - name: Install and format
        if: steps.guard.outputs.applied == 'false'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-asyncio pytest-django ruff
          python -m ruff format \
            vulnhunter/scope/validator.py \
            vulnhunter/web/conversation_service.py \
            vulnhunter/web/conversational_authorization.py \
            vulnhunter/web/conversational_views.py \
            tests/unit/test_conversational_url_targets.py
      - name: Commit generated changes
        if: steps.guard.outputs.applied == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Add URL-first authorized assessment intake"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Validate generated changes
        if: steps.guard.outputs.applied == 'false'
        env:
          VULNHUNTER_WEB_DEBUG: 'true'
          VULNHUNTER_GROQ_ENABLED: 'false'
        run: |
          python -m ruff check \
            vulnhunter/scope/validator.py \
            vulnhunter/web/conversation_service.py \
            vulnhunter/web/conversational_authorization.py \
            vulnhunter/web/conversational_views.py \
            tests/unit/test_conversational_url_targets.py
          python -m pytest -q \
            tests/unit/test_conversational_url_targets.py \
            tests/unit/test_conversational_workspace.py \
            tests/unit/test_assessment_workflow.py \
            tests/unit/test_nuclei_activation_controls.py
