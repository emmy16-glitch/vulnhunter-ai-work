name: Temporary final UI patch

on:
  push:
    branches:
      - ui-final-audit-scroll-wiring

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ui-final-audit-scroll-wiring
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Apply exact interaction fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          app = Path("vulnhunter/web/static/web/app.js")
          app_text = app.read_text(encoding="utf-8")
          listener_anchor = '''  searchToggle?.addEventListener("click", openSearch);
          commandDialog?.addEventListener("close", () => {
          '''
          listener_replacement = '''  searchToggle?.addEventListener("click", openSearch);
          commandDialog?.addEventListener("cancel", (event) => {
            event.preventDefault();
            commandDialog.close();
          });
          commandDialog?.addEventListener("click", (event) => {
            if (event.target === commandDialog) commandDialog.close();
          });
          commandDialog?.addEventListener("close", () => {
          '''
          if listener_anchor in app_text:
              app_text = app_text.replace(listener_anchor, listener_replacement, 1)
          elif listener_replacement not in app_text:
              raise SystemExit("app.js dialog-listener anchor not found")

          key_anchor = '''    if (event.key === "Escape" && sidebar?.classList.contains("is-open")) {
              setNavigation(false);
            }
          '''
          key_replacement = '''    if (event.key === "Escape" && commandDialog?.open) {
              event.preventDefault();
              commandDialog.close();
              return;
            }
            if (event.key === "Escape" && sidebar?.classList.contains("is-open")) {
              setNavigation(false);
            }
          '''
          if key_anchor in app_text:
              app_text = app_text.replace(key_anchor, key_replacement, 1)
          elif key_replacement not in app_text:
              raise SystemExit("app.js Escape anchor not found")
          app.write_text(app_text, encoding="utf-8")

          audit = Path(".playwright-validate.cjs")
          audit_text = audit.read_text(encoding="utf-8")
          audit_text = audit_text.replace(
              '''          const settingsResult = page.getByRole("link", { name: "Settings", exact: true });''',
              '''          const settingsResult = dialog.getByRole("link", { name: "Settings", exact: true });''',
              1,
          )
          close_anchor = '''          await page.keyboard.press("Escape");
                    if (await dialog.evaluate((element) => element.open)) {
                      report.interactionFailures.push({ routeKey, interaction: "search-close" });
                    }
          '''
          close_replacement = '''          await dialog.getByRole("button", { name: "Close search" }).click();
                    await dialog.waitFor({ state: "hidden" });
                    if (await dialog.evaluate((element) => element.open)) {
                      report.interactionFailures.push({ routeKey, interaction: "search-close" });
                    }
          '''
          if close_anchor in audit_text:
              audit_text = audit_text.replace(close_anchor, close_replacement, 1)
          elif close_replacement not in audit_text:
              raise SystemExit("Playwright search-close anchor not found")
          audit_text = audit_text.replace(
              '''              label?.textContent.trim()
          ''',
              '''              label?.textContent.trim() ||
                        element.closest("label")?.textContent.trim()
          ''',
              1,
          )
          audit.write_text(audit_text, encoding="utf-8")
          PY

      - name: Verify patched JavaScript
        run: |
          node --check vulnhunter/web/static/web/app.js
          node --check .playwright-validate.cjs

      - name: Commit exact patch
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vulnhunter/web/static/web/app.js .playwright-validate.cjs
          git commit -m "Harden search dialog and UI interaction audit"
          git push origin HEAD:ui-final-audit-scroll-wiring
