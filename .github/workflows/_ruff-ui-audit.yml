name: Canonicalize UI audit Python

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/full-ui-audit-and-wiring
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Apply Ruff fixes and formatting
        run: |
          if [ "$(git log -1 --pretty=%s)" = "Apply Ruff UI audit fixes" ]; then exit 0; fi
          python -m pip install ruff
          python -m ruff check --fix . || true
          python -m ruff format .
          git diff --check
      - name: Commit canonical Python
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'OpenAI Agent'
          git config user.email 'agent@openai.com'
          git add -A
          git commit -m 'Apply Ruff UI audit fixes'
          git push origin HEAD:agent/full-ui-audit-and-wiring
