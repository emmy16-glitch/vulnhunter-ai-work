name: Render hotfix formatting

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  render:
    if: github.event.pull_request.head.ref == 'hotfix/chat-runtime-reply'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install ruff
      - name: Format regression test
        run: python -m ruff format tests/unit/test_chat_runtime_reply.py
      - name: Upload exact formatted file
        uses: actions/upload-artifact@v6
        with:
          name: formatted-chat-runtime-test
          path: tests/unit/test_chat_runtime_reply.py
          retention-days: 1
