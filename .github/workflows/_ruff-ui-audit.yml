name: Diagnose UI audit Python

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Capture Ruff diagnostics
        run: |
          python -m pip install ruff
          python -m ruff check . > "$RUNNER_TEMP/ruff.txt" 2>&1 || true
          python -m ruff format --check . >> "$RUNNER_TEMP/ruff.txt" 2>&1 || true
          cat "$RUNNER_TEMP/ruff.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: ui-audit-ruff-diagnostics
          path: ${{ runner.temp }}/ruff.txt
          if-no-files-found: error
          retention-days: 1
