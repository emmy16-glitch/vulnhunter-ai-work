name: VulnHunter quality gates

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and verification tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio pytest-django ruff

      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          python -m ruff check . 2>&1 | tee "$RUNNER_TEMP/ruff-${{ matrix.python-version }}.log"

      - name: Upload failed lint log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ruff-log-${{ matrix.python-version }}
          path: ${{ runner.temp }}/ruff-${{ matrix.python-version }}.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Compile
        run: python -m compileall -q vulnhunter scripts

      - name: Validate scanner compatibility
        run: python scripts/validate_scanner_compatibility.py

      - name: Verify restricted-worker scripts
        run: |
          bash -n scripts/install_remote_nuclei_worker.sh
          python -m compileall -q \
            scripts/remote_nuclei_forced_command.py \
            vulnhunter/security_tools/remote_nuclei_models.py \
            vulnhunter/security_tools/remote_nuclei_worker.py \
            vulnhunter/security_tools/remote_nuclei_service.py

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q --maxfail=5 2>&1 | tee "$RUNNER_TEMP/pytest-${{ matrix.python-version }}.log"

      - name: Upload failed test log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-log-${{ matrix.python-version }}
          path: ${{ runner.temp }}/pytest-${{ matrix.python-version }}.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Verify formatting
        run: python -m ruff format --check .

      - name: Repository audit
        run: python scripts/project_audit.py --strict

  visual-smoke:
    name: Browser UI audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VULNHUNTER_WEB_DEBUG: "true"
      VULNHUNTER_WEB_DATABASE: /tmp/vh-ui/web.sqlite3
      VULNHUNTER_AUTHORIZATION_DATABASE: /tmp/vh-ui/auth.db
      VULNHUNTER_GOVERNANCE_DATABASE: /tmp/vh-ui/governance.db
      VULNHUNTER_AGENT_DATABASE: /tmp/vh-ui/agent.db
      VULNHUNTER_APPROVAL_DATABASE: /tmp/vh-ui/approvals.sqlite3
      VULNHUNTER_AGENT_ACTIVITY_ROOT: /tmp/vh-ui/activity
      VULNHUNTER_SECURITY_EVIDENCE_ROOT: /tmp/vh-ui/evidence
      VULNHUNTER_MOBILE_ARTIFACT_ROOT: /tmp/vh-ui/mobile
      VULNHUNTER_ADVERSARY_LAB_DATABASE: /tmp/vh-ui/lab.sqlite3
      VULNHUNTER_UI_MANIFEST: /tmp/vh-ui/ui-manifest.json
      VULNHUNTER_UI_OUTPUT: /tmp/vh-ui/screenshots
      VULNHUNTER_UI_BASE_URL: http://127.0.0.1:8767

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Check browser JavaScript syntax
        run: |
          node --check vulnhunter/web/static/web/app.js
          node --check vulnhunter/web/static/web/activity.js
          node --check vulnhunter/web/static/web/assessment-modal.js
          node --check .playwright-validate.cjs

      - name: Install application and browser audit tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio pytest-django
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Prepare deterministic local audit data
        run: |
          rm -rf /tmp/vh-ui
          mkdir -p /tmp/vh-ui
          python manage.py migrate --noinput
          python tests/ui/prepare_visual_audit.py

      - name: Start local web application
        run: |
          python manage.py runserver 127.0.0.1:8767 --noreload > /tmp/vh-ui/server.log 2>&1 &
          for attempt in $(seq 1 40); do
            if curl --fail --silent http://127.0.0.1:8767/health/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/vh-ui/server.log
          exit 1

      - name: Capture and validate responsive product UI
        run: node .playwright-validate.cjs

      - name: Upload visual audit evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vulnhunter-ui-audit
          path: |
            /tmp/vh-ui/screenshots
            /tmp/vh-ui/server.log
          if-no-files-found: error
          retention-days: 7

  phone-private-lab:
    name: Genuine phone-lab Nuclei acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install application
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install and checksum-verify pinned Nuclei
        env:
          VULNHUNTER_NUCLEI_INSTALL_ROOT: /tmp/vulnhunter-nuclei-v3.8.0
        run: bash .devcontainer/install-nuclei.sh

      - name: Start the RFC1918 deliberate target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          ADDRESS="$(python scripts/phone_lab_target.py --print-address)"
          echo "address=$ADDRESS" >> "$GITHUB_OUTPUT"
          python scripts/phone_lab_target.py --host "$ADDRESS" --port 8010 \
            > /tmp/vulnhunter-phone-target.log 2>&1 &
          echo $! > /tmp/vulnhunter-phone-target.pid
          for attempt in $(seq 1 40); do
            if curl --fail --silent "http://$ADDRESS:8010/healthz" >/dev/null; then
              exit 0
            fi
            sleep 0.25
          done
          cat /tmp/vulnhunter-phone-target.log
          exit 1

      - name: Verify engine and reviewed template digests
        run: |
          python scripts/nuclei_readiness.py \
            --executable /tmp/vulnhunter-nuclei-v3.8.0/bin/nuclei \
            --manifest config/security_tools/nuclei_template_manifest.json \
            --template-root config/security_tools/pilot_templates \
            --execution-enabled \
            --output /tmp/vulnhunter-phone-readiness.json \
            --require-ready

      - name: Run genuine authorization-to-evidence acceptance
        shell: bash
        run: |
          set -o pipefail
          python scripts/phone_lab_acceptance.py \
            --runtime-root /tmp/vulnhunter-phone-acceptance \
            --executable /tmp/vulnhunter-nuclei-v3.8.0/bin/nuclei \
            --readiness-report /tmp/vulnhunter-phone-readiness.json \
            --target-url "http://${{ steps.target.outputs.address }}:8010/" \
            2>&1 | tee /tmp/vulnhunter-phone-acceptance.log

      - name: Stop target and print diagnostics on failure
        if: always()
        shell: bash
        run: |
          if [[ -f /tmp/vulnhunter-phone-target.pid ]]; then
            kill "$(cat /tmp/vulnhunter-phone-target.pid)" 2>/dev/null || true
          fi
          if [[ "${{ job.status }}" != "success" ]]; then
            cat /tmp/vulnhunter-phone-target.log || true
            cat /tmp/vulnhunter-phone-readiness.json || true
          fi

      - name: Upload phone-lab diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: vulnhunter-phone-lab-diagnostics
          path: |
            /tmp/vulnhunter-phone-target.log
            /tmp/vulnhunter-phone-readiness.json
            /tmp/vulnhunter-phone-acceptance.log
            /tmp/vulnhunter-phone-acceptance
          if-no-files-found: warn
          retention-days: 3

  apply-final-phone-lab:
    name: Apply final phone-lab wiring
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'work/phone-only-private-lab' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: work/phone-only-private-lab
          fetch-depth: 0

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip

      - name: Apply live progress and worker runtime fixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Expected block not found in {path}: {old[:100]!r}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace(
              "vulnhunter/web/assessment_workflow.py",
              '''            event_type=(
                  "scanner_queued"
                  if queued_job is not None
                  else "run_blocked"
                  if approved
                  else "approval_rejected"
              ),
              run_state=(
