name: Temporary lint fixer

on:
  push:
    branches:
      - final-ui-ux-hardening-and-scroll-audit

permissions:
  contents: write

jobs:
  lint-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: final-ui-ux-hardening-and-scroll-audit
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install "ruff>=0.9,<1"
      - run: python -m ruff check --fix .
      - run: python -m ruff format .
      - name: Commit lint and formatting fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Apply final UI audit lint fixes"
          git push origin HEAD:final-ui-ux-hardening-and-scroll-audit
