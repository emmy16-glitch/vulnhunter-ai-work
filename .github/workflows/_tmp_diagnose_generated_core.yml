name: Diagnose generated conversational core

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'feature/conversational-url-targets'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Normalize patcher
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/_tmp_apply_conversation_core.py')
          content = path.read_text(encoding='utf-8')
          helper_anchor = 'def regex_once(path: str, pattern: str, replacement: str) -> None:\n'
          helper = '''def replace_all(path: str, old: str, new: str, *, expected: int) -> None:\n    content = read(path)\n    count = content.count(old)\n    if count != expected:\n        raise RuntimeError(f"Expected {expected} matches in {path}, found {count}")\n    write(path, content.replace(old, new))\n\n\n'''
          if 'def replace_all(' not in content:
              content = content.replace(helper_anchor, helper + helper_anchor, 1)
          content = content.replace(
              'replace_once(\n    ".github/workflows/conversation-quality.yml",\n    \'\'\'            vulnhunter/web/conversation_service.py \\\\\\n            vulnhunter/web/conversational_authorization.py \\\\\\n            vulnhunter/web/conversational_views.py \\\\\\n\'\'\',',
              'replace_all(\n    ".github/workflows/conversation-quality.yml",\n    \'\'\'            vulnhunter/web/conversation_service.py \\\\\\n            vulnhunter/web/conversational_authorization.py \\\\\\n            vulnhunter/web/conversational_views.py \\\\\\n\'\'\',',
              1,
          )
          marker = '''            vulnhunter/web/conversational_views.py \\\\\\n\'\'\',\n)\nreplace_once(\n    ".github/workflows/conversation-quality.yml",\n    \'\'\'            tests/unit/test_chat_runtime_reply.py'''
          content = content.replace(
              marker,
              '''            vulnhunter/web/conversational_views.py \\\\\\n\'\'\',\n    expected=2,\n)\nreplace_all(\n    ".github/workflows/conversation-quality.yml",\n    \'\'\'            tests/unit/test_chat_runtime_reply.py''',
              1,
          )
          marker2 = '''            tests/unit/test_conversational_url_targets.py \\\\\\n\'\'\',\n)\nreplace_once(\n    ".github/workflows/conversation-quality.yml",\n    \'\'\'            tests/unit/test_chat_runtime_reply.py'''
          content = content.replace(
              marker2,
              '''            tests/unit/test_conversational_url_targets.py \\\\\\n\'\'\',\n    expected=3,\n)\nreplace_once(\n    ".github/workflows/conversation-quality.yml",\n    \'\'\'            tests/unit/test_chat_runtime_reply.py''',
              1,
          )
          start = content.find('replace_once(\n    ".github/workflows/conversation-quality.yml",\n    \'\'\'            tests/unit/test_chat_runtime_reply.py \\\\\\n            tests/unit/test_conversational_url_targets.py \\\\\\n            tests/unit/test_conversation_experience.py')
          if start != -1:
              end = content.find('\nreplace_once(\n    ".github/workflows/quality.yml",', start)
              content = content[:start] + content[end + 1:]
          content = content.replace(
              '''replace_once(\n    ".github/workflows/quality.yml",\n    '      VULNHUNTER_INTELLIGENCE_ENABLED: "false"\\n',''',
              '''replace_once(\n    ".github/workflows/quality.yml",\n    \'\'\'      VULNHUNTER_UI_BASE_URL: http://127.0.0.1:8767\\n      VULNHUNTER_INTELLIGENCE_ENABLED: "false"\\n\'\'\',''',
              1,
          )
          content = content.replace(
              '''    \'\'\'      VULNHUNTER_INTELLIGENCE_ENABLED: "false"\\n      VULNHUNTER_NUCLEI_READINESS_REPORT:''',
              '''    \'\'\'      VULNHUNTER_UI_BASE_URL: http://127.0.0.1:8767\\n      VULNHUNTER_INTELLIGENCE_ENABLED: "false"\\n      VULNHUNTER_NUCLEI_READINESS_REPORT:''',
              1,
          )
          path.write_text(content, encoding='utf-8')
          PY
      - name: Generate files
        run: python scripts/_tmp_apply_conversation_core.py
      - name: Capture syntax and formatting diagnostics
        continue-on-error: true
        run: |
          python -m pip install ruff
          set -o pipefail
          {
            python -m compileall -q \
              vulnhunter/web/conversation_service.py \
              vulnhunter/web/conversation_state.py \
              vulnhunter/web/conversational_views.py \
              vulnhunter/web/conversation_approval_views.py \
              tests/unit/test_conversation_core_redesign.py \
              tests/ui/prepare_conversation_e2e.py \
              tests/ui/complete_conversation_run.py
            python -m ruff format --check \
              vulnhunter/web/conversation_service.py \
              vulnhunter/web/conversation_state.py \
              vulnhunter/web/conversational_views.py \
              vulnhunter/web/conversation_approval_views.py \
              tests/unit/test_conversation_core_redesign.py \
              tests/ui/prepare_conversation_e2e.py \
              tests/ui/complete_conversation_run.py
          } 2>&1 | tee generated-core-diagnostics.log
      - name: Upload generated files
        uses: actions/upload-artifact@v6
        with:
          name: generated-conversation-core
          retention-days: 2
          path: |
            generated-core-diagnostics.log
            vulnhunter/web/conversation_service.py
            vulnhunter/web/conversation_state.py
            vulnhunter/web/conversational_views.py
            vulnhunter/web/conversation_approval_views.py
            vulnhunter/web/static/web/conversation.js
            vulnhunter/web/static/web/conversation-layout.css
            vulnhunter/web/templates/web/conversation.html
            tests/unit/test_conversation_core_redesign.py
            tests/unit/test_conversation_experience.py
            tests/ui/prepare_conversation_e2e.py
            tests/ui/complete_conversation_run.py
            tests/ui/conversation_e2e.cjs
