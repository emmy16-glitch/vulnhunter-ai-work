name: Format diagnostic

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install "ruff>=0.9,<1"
      - name: Show required formatting changes
        run: python -m ruff format --check --diff .
