name: VulnHunter quality gates

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-formatting:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repair branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Format identified files
        run: |
          python -m pip install ruff
          python -m ruff format \
            tests/unit/test_reference_ui_contract.py \
            vulnhunter/web/assessment_projection.py \
            vulnhunter/web/forms.py
          python -m ruff check \
            tests/unit/test_reference_ui_contract.py \
            vulnhunter/web/assessment_projection.py \
            vulnhunter/web/forms.py

      - name: Commit targeted formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            tests/unit/test_reference_ui_contract.py \
            vulnhunter/web/assessment_projection.py \
            vulnhunter/web/forms.py
          if git diff --cached --quiet; then
            echo "No formatting changes required."
          else
            git commit -m "Apply Ruff formatting"
            git push origin "HEAD:${{ github.head_ref }}"
          fi

  verify:
    needs: repair-formatting
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and verification tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-asyncio pytest-django ruff

      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          python -m ruff check . 2>&1 | tee "$RUNNER_TEMP/ruff-${{ matrix.python-version }}.log"

      - name: Upload lint log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-log-${{ matrix.python-version }}
          path: ${{ runner.temp }}/ruff-${{ matrix.python-version }}.log
          if-no-files-found: warn
          retention-days: 3

      - name: Verify formatting
        shell: bash
        run: |
          set -o pipefail
          python -m ruff format --check --diff . 2>&1 | tee "$RUNNER_TEMP/ruff-format-${{ matrix.python-version }}.log"

      - name: Upload formatting log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-format-log-${{ matrix.python-version }}
          path: ${{ runner.temp }}/ruff-format-${{ matrix.python-version }}.log
          if-no-files-found: warn
          retention-days: 3

      - name: Compile
        run: python -m compileall -q vulnhunter scripts

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q --maxfail=5 2>&1 | tee "$RUNNER_TEMP/pytest-${{ matrix.python-version }}.log"

      - name: Upload failed test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-${{ matrix.python-version }}
          path: ${{ runner.temp }}/pytest-${{ matrix.python-version }}.log
          if-no-files-found: warn
          retention-days: 3

      - name: Repository audit
        run: python scripts/project_audit.py --strict
