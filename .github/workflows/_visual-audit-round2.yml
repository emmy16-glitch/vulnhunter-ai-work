name: Apply browser evidence repairs

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/full-ui-audit-and-wiring
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Apply evidence-backed browser repairs
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def write_changed(path: str, transform) -> None:
              target = Path(path)
              original = target.read_text(encoding="utf-8")
              updated = transform(original)
              if updated == original:
                  raise SystemExit(f"no repair applied to {path}")
              target.write_text(updated, encoding="utf-8")

          write_changed(
              "vulnhunter/web/static/web/app.js",
              lambda text: text.replace(
                  "\n  }\n\n  const disclosureRoute",
                  "\n\n  const disclosureRoute",
                  1,
              ),
          )

          def add_audit_css(text: str) -> str:
              if "web/ui-audit.css" in text:
                  return text
              marker = (
                  "  <link rel=\"stylesheet\" "
                  "href=\"{% static 'web/console.css' %}?v=20260722-console\">\n"
              )
              return text.replace(
                  marker,
                  marker
                  + "  <link rel=\"stylesheet\" "
                  + "href=\"{% static 'web/ui-audit.css' %}?v=20260722-audit2\">\n",
                  1,
              )

          write_changed("vulnhunter/web/templates/web/base.html", add_audit_css)

          def repair_validator(text: str) -> str:
              text, active_count = re.subn(
                  r"(const activeNavigation = \[\.\.\.document\.querySelectorAll\([^;]+\)\])\.filter\(visible\);",
                  r"\1;",
                  text,
                  count=1,
              )
              text, error_count = re.subn(
                  r"djangoError: /Traceback\|TemplateSyntaxError\|Server Error \\(500\\\)/i\.test\(bodyText\),",
                  "djangoError: Boolean(document.querySelector('#traceback, .technical-500')) || "
                  "/TemplateSyntaxError at\\/|Server Error \\(500\\)/i.test(bodyText),",
                  text,
                  count=1,
              )
              if active_count != 1 or error_count != 1:
                  raise SystemExit(
                      f"validator repair counts were active={active_count}, error={error_count}"
                  )
              return text

          write_changed(".playwright-validate.cjs", repair_validator)

          duplicate_templates = (
              "vulnhunter/web/templates/web/advanced_profiles.html",
              "vulnhunter/web/templates/web/approvals.html",
              "vulnhunter/web/templates/web/status.html",
              "vulnhunter/web/templates/web/security_tools.html",
              "vulnhunter/web/templates/web/mobile_analysis.html",
              "vulnhunter/web/templates/web/authorizations_overview.html",
              "vulnhunter/web/templates/web/dashboard.html",
          )
          removed = 0
          for path in duplicate_templates:
              target = Path(path)
              lines = target.read_text(encoding="utf-8").splitlines()
              filtered = [
                  line
                  for line in lines
                  if not (
                      "product.css" in line
                      and "20260717-integration1" in line
                  )
              ]
              if len(filtered) != len(lines):
                  removed += len(lines) - len(filtered)
                  target.write_text("\n".join(filtered) + "\n", encoding="utf-8")
          if removed == 0:
              raise SystemExit("no duplicate legacy product stylesheet was removed")
          PY
          git diff --check
      - name: Commit browser repairs
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'OpenAI Agent'
          git config user.email 'agent@openai.com'
          git add -A
          git commit -m 'Repair browser runtime and responsive layout'
          git push origin HEAD:agent/full-ui-audit-and-wiring
